name: "ecommerce"
version: "1.0.0"
config-version: 2

profile: "ecommerce" # matches profiles.yml target and the Cosmos ProfileConfig

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_modules"

# ---------------------------------------------------------------------------
# # ESTRATÉGIA DE MATERIALIZAÇÃO POR CAMADA
#
# staging  -> view      Os modelos de staging só renomeiam/convertem/limpam
#                        colunas brutas. São baratos de (re)computar e uma
#                        view garante que toda query downstream sempre veja
#                        os dados brutos mais recentes — também não há custo
#                        de armazenamento. Alternativa ingênua: materializar
#                        staging como tabela desperdiça armazenamento e
#                        obriga você a lembrar de rodar novamente.
#
# intermediate -> ephemeral   Modelos puramente de "encanamento" (plumbing),
#                        usados só dentro de outros modelos dbt (ex: um join
#                        usado por um único mart). Ephemeral significa que o
#                        dbt os embute como uma CTE em tempo de compilação —
#                        nada físico é criado, então o schema do banco fica
#                        limpo, sem modelos auxiliares que ninguém consulta
#                        diretamente.
#
# marts    -> table     Estes são os modelos que ferramentas de BI/analistas
#                        consultam. Recalcular uma view sobre um pipeline com
#                        vários joins a cada atualização de dashboard é lento
#                        e caro; uma tabela troca armazenamento + uma
#                        reconstrução agendada por performance de leitura
#                        rápida e previsível. Em escala real de produção,
#                        você promoveria esses modelos para `incremental`,
#                        assim cada execução processa só as linhas novas ou
#                        alteradas em vez de reconstruir tudo — comentado na
#                        seção "como isso escala" do README.md.
# ---------------------------------------------------------------------------

# # Os seeds substituem os dados que uma ferramenta de EL (Fivetran/Airbyte/
# Meltano) normalmente depositaria em um schema "raw". Carregá-los em um
# schema `raw` próprio — em vez do schema padrão de destino do dbt — mantém
# honesta a fronteira entre "dados que não controlamos" (raw) e "dados que o
# dbt constrói" (staging/marts), e permite que o sources.yml os descreva da
# mesma forma que descreveria uma tabela real carregada por um EL.

seeds:
  ecommerce:
    +schema: raw

models:
  ecommerce:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts