version: 2

models:
  - name: int_orders_enriched
    description: >
      Itens de pedido cruzados com o preço do produto, com o valor da linha
      já com desconto calculado uma única vez, para que fct_orders e qualquer
      mart futuro não precisem reimplementar a matemática do desconto.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: net_amount
        tests:
          - not_null