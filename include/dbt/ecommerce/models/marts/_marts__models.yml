version: 2

models:
  - name: dim_customers
    description: Uma linha por cliente, enriquecida com agregações de pedidos.
    columns:
      - name: customer_id
        tests: 
          - not_null
          - unique
      - name: lifetime_value
        tests:
          - expression_is_true:
              arguments:
                expression: ">=0"

  - name: dim_products
    description: Uma linha por produto.
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: fct_orders
    description: >
      Granularidade: uma linha por item de pedido (order_id, product_id). Esta
      é a tabela que ferramentas de BI devem consultar para análises no nível
      de pedido.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: net_amount
        tests:
          - not_null

