version: 2

models:
  - name: stg_customers
    description: Cleaned, 1:1 view over raw_customers.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null
          - unique
  
  - name: stg_products
    description: Cleaned, 1:1 view over raw_products.
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: category
        tests:
          - accepted_values:
              values: ['Electronics', 'Office', 'Lifestyle']
    
  - name: stg_orders
    description: Cleaned, 1:1 view over raw_orders.
    columns: 
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: order_date
        tests:
          - accepted_values:
              values: ['completed', 'pending', 'cancelled']
