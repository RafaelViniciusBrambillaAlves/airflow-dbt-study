version: 2

sources:
  - name: raw
    description: >
      Raw tables as landed by the ingestion layer (here: dbt seeds standing
      in for an EL tool). Nothing in this schema is trusted or cleaned yet —
      staging models are the only place allowed to select from these.
    schema: raw
    tables:
      - name: raw_customers
        description: One row per customer, as received from the source system.
        columns: 
          - name: customer_id
            description: Natural key from the source system.
            tests:
              - unique
              - not_null
      - name: raw_products
        description:  Product catalog snapshot.
        columns:
          - name: product_id
            tests:
              - unique
              - not_null
      - name: raw_orders
        description: One row per order line.
        columns:
          - name: order_id
            tests:
              - unique
              - not_null