version: 2

sources:
  - name: raw
    description: >
      Tabelas brutas conforme depositadas pela camada de ingestão (aqui: seeds
      do dbt no lugar de uma ferramenta de EL). Nada neste schema é confiável
      ou está limpo ainda — os modelos de staging são o único lugar autorizado
      a fazer select nessas tabelas.
    schema: analytics_raw
    tables:
      - name: raw_customers
        description: Uma linha por cliente, como recebida do sistema de origem.
        columns: 
          - name: customer_id
            description: Chave natural do sistema de origem.
            tests:
              - unique
              - not_null
      - name: raw_products
        description: Snapshot do catálogo de produtos.
        columns:
          - name: product_id
            tests:
              - unique
              - not_null
      - name: raw_orders
        description: Uma linha por item de pedido.
        columns:
          - name: order_id
            tests:
              - unique
              - not_null